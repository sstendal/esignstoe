<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FakeID – Fødselsnummer</title>
  <style>
    :root {
      --bg: #2b2f2b;
      --overlay: rgba(0, 0, 0, 0.18);
      --panel: #02150c;
      --panel-edge: rgba(255, 255, 255, 0.03);
      --text: #f3f3f1;
      --muted: rgba(255, 255, 255, 0.78);
      --soft: rgba(255, 255, 255, 0.68);
      --border: rgba(255, 255, 255, 0.9);
      --input-bg: rgba(255, 255, 255, 0.04);
      --button-bg: #cfcfd4;
      --button-text: rgba(255, 255, 255, 0.78);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Helvetica,
        Arial,
        sans-serif;
      background:
        linear-gradient(rgba(0,0,0,0.12), rgba(0,0,0,0.12)),
        radial-gradient(circle at 50% 45%, #343934 0%, #2b2f2b 55%, #262925 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: var(--overlay);
    }

    .modal-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      transform: translateY(-4px);
    }

    .card {
      width: 600px;
      max-width: calc(100vw - 48px);
      min-height: 690px;
      background: linear-gradient(180deg, #011108 0%, #02150c 100%);
      border-radius: 26px;
      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.28),
        inset 0 0 0 1px var(--panel-edge);
      padding: 34px 62px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand {
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      opacity: 0.96;
      font-weight: 700;
      font-size: 27px;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 42px;
      height: 22px;
      display: grid;
      grid-template-columns: repeat(3, 8px);
      grid-template-rows: repeat(3, 4px);
      gap: 3px 3px;
      align-items: center;
      justify-content: center;
    }

    .brand-mark span {
      width: 8px;
      height: 4px;
      border-radius: 99px;
      background: currentColor;
      display: block;
    }

    .brand-mark span:nth-child(2),
    .brand-mark span:nth-child(5),
    .brand-mark span:nth-child(8) {
      width: 4px;
      justify-self: center;
    }

    .title {
      margin-top: 38px;
      font-size: 58px;
      line-height: 1.05;
      letter-spacing: -0.04em;
      font-weight: 650;
      text-align: center;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 24px;
      line-height: 1.3;
      color: var(--muted);
      font-weight: 400;
      text-align: center;
    }

    .form-area {
      margin-top: 106px;
      width: 100%;
      max-width: 410px;
    }

    .label {
      font-size: 30px;
      line-height: 1.25;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
      color: var(--text);
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      width: 24px;
      height: 24px;
      transform: translateY(-50%);
      opacity: 0.88;
      pointer-events: none;
    }

    .input {
      width: 100%;
      height: 68px;
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.88);
      background: var(--input-bg);
      color: var(--text);
      font-size: 22px;
      padding: 0 18px 0 58px;
      outline: none;
    }

    .input::placeholder {
      color: rgba(255,255,255,0.72);
    }

    .helper {
      margin-top: 14px;
      font-size: 17px;
      color: rgba(255,255,255,0.84);
      line-height: 1.35;
    }

    .actions {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 34px;
      padding-top: 84px;
    }

    .next-btn {
      width: 164px;
      height: 74px;
      border: 0;
      border-radius: 999px;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 23px;
      font-weight: 500;
      cursor: default;
      box-shadow: none;
    }

    .link {
      color: var(--text);
      font-size: 22px;
      line-height: 1.2;
      font-weight: 500;
      text-decoration-thickness: 2px;
      text-underline-offset: 5px;
    }

    .cancel {
      color: rgba(255,255,255,0.82);
      font-size: 20px;
      text-decoration-thickness: 1px;
      text-underline-offset: 4px;
    }

    .next-btn:not(:disabled) {
      background: #4ade80;
      color: #000;
      cursor: pointer;
    }

    .warning-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      place-items: center;
      z-index: 100;
    }

    .warning-overlay.show {
      display: grid;
    }

    .warning-box {
      background: #1a1a1a;
      border: 2px solid #f59e0b;
      border-radius: 16px;
      padding: 32px;
      max-width: 500px;
      margin: 24px;
      text-align: center;
    }

    .warning-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .warning-title {
      font-size: 24px;
      font-weight: 600;
      color: #f59e0b;
      margin-bottom: 16px;
    }

    .warning-text {
      font-size: 18px;
      line-height: 1.6;
      color: var(--text);
    }

    .warning-close {
      margin-top: 24px;
      padding: 12px 32px;
      background: #f59e0b;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      .card {
        min-height: auto;
        padding: 28px 26px 36px;
        border-radius: 22px;
      }

      .title {
        font-size: 44px;
      }

      .subtitle {
        font-size: 22px;
      }

      .form-area {
        margin-top: 64px;
        max-width: none;
      }

      .label {
        font-size: 24px;
      }

      .input {
        height: 62px;
        font-size: 20px;
      }

      .actions {
        padding-top: 56px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="modal-wrap">
      <div class="card">
        <div class="brand" aria-label="FakeID">
          <div class="brand-mark" aria-hidden="true">
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
            <span></span><span></span><span></span>
          </div>
          <div>fakeID</div>
        </div>

        <div class="title">Fødselsnummer</div>
        <div class="subtitle">FakeID</div>

        <div class="form-area">
          <div class="label">Hva er ditt fødselsnummer?</div>

          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="8" r="4.1"></circle>
              <path d="M4 20c1.6-3.6 4.2-5.5 7-5.5s5.4 1.9 7 5.5"></path>
            </svg>
            <input class="input" type="text" placeholder="11 siffer" />
          </div>

          <div class="helper">Fyll inn fødselsnummer</div>
        </div>

        <div class="actions">
          <button class="next-btn" disabled>Neste</button>
          <a href="#" class="link">Gå tilbake</a>
        </div>
      </div>

      <a href="#" class="cancel">Avbryt</a>
    </div>
  </div>

  <div class="warning-overlay" id="warning">
    <div class="warning-box">
      <div class="warning-icon">⚠️</div>
      <div class="warning-title">Advarsel</div>
      <p class="warning-text">
        Dette er ikke en offisiell login-side. Det er en demonstrasjon som viser hvor enkelt det er å lage en falsk side. Opplysningene dine er ikke lagret – du er helt trygg.
      </p>
      <button class="warning-close" id="closeWarning">Lukk</button>
    </div>
  </div>

  <script>
    const input = document.querySelector('.input');
    const btn = document.querySelector('.next-btn');
    const warning = document.getElementById('warning');
    const closeWarning = document.getElementById('closeWarning');

    input.addEventListener('input', () => {
      btn.disabled = input.value.trim() === '';
    });

    btn.addEventListener('click', () => {
      if (!btn.disabled) {
        warning.classList.add('show');
      }
    });

    closeWarning.addEventListener('click', () => {
      warning.classList.remove('show');
    });

    warning.addEventListener('click', (e) => {
      if (e.target === warning) {
        warning.classList.remove('show');
      }
    });
  </script>
</body>
</html>
